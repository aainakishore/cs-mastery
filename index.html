<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4F46E5" />
    <meta name="description" content="Duolingo-style CS learning app — offline, gamified, adaptive." />
    <title>CS Mastery</title>
    <style>
      html, body, #root { background: #020617; margin: 0; padding: 0; height: 100%; }
    </style>
    <script>
      // Companion to public/404.html — restores path after GitHub Pages redirect
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Handle ?p= encoding from 404.html
        var p = window.location.search;
        if (p && p.indexOf('?p=/') === 0) {
          var path = p.slice(3).replace(/~and~/g, '&');
          history.replaceState(null, null, path || '/cs-mastery/');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
